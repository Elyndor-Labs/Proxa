name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
  build-sdk:
    name: Build SDK
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @proxa/sdk build
      - run: pnpm exec tsc -p packages/programs/tsconfig.json --noEmit
  build-programs:
    name: Build Anchor Programs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/programs/target
          key: ${{ runner.os }}-anchor-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libudev-dev
      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
      - name: Install Solana CLI
        run: |
          curl -sSfL https://release.anza.xyz/stable/install -o solana-install.sh
          sh solana-install.sh
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      - name: Install Anchor CLI
        run: cargo install anchor-cli --version 0.32.1 --locked
      - name: Verify toolchain
        run: |
          rustc --version
          cargo --version
          solana --version
          anchor --version
      - name: Build
        working-directory: packages/programs
        run: anchor build
  # Test
  # for now, we will not run tests in CI because they require a local validator and are slow. We will run tests locally before merging to main/dev.