name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  build-sdk:
    name: Typecheck Program Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc -p packages/programs/tsconfig.json --noEmit

  build-programs:
    name: Build Anchor Programs
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/programs/target
          key: ${{ runner.os }}-anchor-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Solana (Agave) CLI
        run: |
          curl -sSfL https://release.anza.xyz/v2.1.21/install -o solana-install.sh
          sh solana-install.sh
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      - name: Verify Solana toolchain
        run: |
          solana --version
          cargo-build-sbf --version
      - name: Install Anchor CLI
        run: cargo install anchor-cli --version 0.32.1 --locked
      - name: Build
        run: cd packages/programs && anchor build

  test-programs:
    name: Test Anchor Programs
    runs-on: ubuntu-latest
    needs: build-programs
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/programs/target
          key: ${{ runner.os }}-anchor-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Solana (Agave) CLI
        run: |
          curl -sSfL https://release.anza.xyz/v2.1.21/install -o solana-install.sh
          sh solana-install.sh
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      - name: Verify Solana toolchain
        run: |
          solana --version
          cargo-build-sbf --version
      - name: Install Anchor CLI
        run: cargo install anchor-cli --version 0.32.1 --locked
      - run: pnpm install --frozen-lockfile
      - run: cd packages/programs && anchor test
